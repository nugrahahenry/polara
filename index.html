<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polara — AI Photobooth</title>
  <link rel="icon" href="assets/brand/app-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    /* ── shell layout (struktur; warna/font dari tokens.css) ── */
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      font-family: var(--font-ui); font-weight: 600;
      background:
        radial-gradient(circle at 8% 6%, rgba(255,226,111,.35) 0 4%, transparent 5%),
        radial-gradient(circle at 92% 8%, rgba(143,211,255,.35) 0 5%, transparent 6%),
        radial-gradient(circle at 90% 94%, rgba(202,184,255,.32) 0 6%, transparent 7%),
        radial-gradient(circle at 10% 92%, rgba(255,194,216,.32) 0 6%, transparent 7%),
        var(--bg);
      display: flex; flex-direction: column;
    }

    /* ── header ── */
    .app-header { display: flex; align-items: center; gap: 14px; padding: 18px 28px; }
    .brand-logo { height: 46px; width: auto; display: block; filter: drop-shadow(0 4px 8px rgba(75,46,31,.16)); }
    .brand-tag {
      font-family: var(--font-display); font-weight: 600; color: #a62f6b; /* a11y: ≥4.5:1 di atas putih */
      background: var(--white); border: 2px solid var(--outline); border-radius: var(--radius-pill);
      padding: 5px 15px; font-size: .82rem; box-shadow: var(--shadow-sticker);
      transform: rotate(-2deg);
    }

    /* ── grid utama ── */
    main.studio {
      flex: 1; width: 100%; max-width: 1180px; margin: 0 auto; padding: 4px 24px 28px;
      display: grid; grid-template-columns: 230px 1fr 250px; gap: 20px; align-items: start;
    }
    .panel {
      background: var(--surface); border: 2px solid var(--outline);
      border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sticker);
    }
    .panel-title {
      margin: 2px 0 12px; font-family: var(--font-display); font-weight: 700; font-size: 1.15rem;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-title .star { color: var(--butter); -webkit-text-stroke: 1.5px var(--outline); }

    /* ── template picker (dengan thumbnail preview) ── */
    #templateList { display: flex; flex-direction: column; gap: 12px; }
    .tpl-btn {
      cursor: pointer; text-align: left; font: inherit; color: var(--text);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 8px; background: var(--cream-2); overflow: hidden;
      display: flex; flex-direction: column; gap: 8px;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .tpl-btn:hover { transform: translateY(-2px); border-color: var(--pink); }
    .tpl-btn:focus-visible { outline: 2px solid var(--outline); outline-offset: 2px; box-shadow: var(--ring); }
    .tpl-btn.active { border-color: var(--outline); background: var(--pink-soft); box-shadow: var(--shadow-sticker); }
    .tpl-thumb {
      position: relative; display: block; width: 100%; height: 150px; overflow: hidden;
      border-radius: 14px; border: 2px solid var(--border);
      background: repeating-conic-gradient(#f3e7db 0 25%, #fff 0 50%) 0 0 / 18px 18px;
    }
    .tpl-thumb-frame { position: absolute; top: 0; left: 0; border: 0; transform-origin: top left; pointer-events: none; }
    .tpl-meta { display: flex; flex-direction: column; gap: 1px; padding: 0 2px 2px; }
    .tpl-name { font-family: var(--font-display); font-weight: 600; font-size: .92rem; line-height: 1.15; }
    .tpl-btn .cat { font-size: .68rem; color: var(--muted); text-transform: capitalize; }

    /* ── panggung (kamera / hasil) ── */
    #stage { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .stage-card {
      position: relative; background: var(--white); border: 2px solid var(--outline);
      border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-sticker);
      width: 100%; display: flex; justify-content: center;
    }
    #cameraWrap { position: relative; width: min(460px, 100%); min-height: 340px; line-height: 0; border-radius: var(--radius); overflow: hidden; transition: filter .1s; }
    video { display: block; width: 100%; max-width: 460px; border-radius: var(--radius); transform: scaleX(-1); background: var(--cream); }
    #canvasScale { transform-origin: top center; display: none; border-radius: var(--radius); overflow: hidden; }

    #countdown {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 700; font-size: 8rem; color: var(--white);
      text-shadow: 0 0 0 var(--outline), 0 8px 24px rgba(75,46,31,.4);
      -webkit-text-stroke: 5px var(--outline); paint-order: stroke fill;
    }

    /* ── empty-state kamera (loading / ditolak) ── */
    #cameraOverlay {
      position: absolute; inset: 0; display: none; flex-direction: column; gap: 12px;
      align-items: center; justify-content: center; text-align: center; padding: 24px; line-height: 1.4;
      background: linear-gradient(180deg, var(--cream-2), var(--pink-soft));
    }
    #cameraOverlay img { width: 130px; height: auto; }
    #camMsg { margin: 0; font-family: var(--font-display); font-weight: 600; color: var(--brown); max-width: 260px; font-size: .95rem; }

    /* ── sticker tray ── */
    #stickerTray {
      display: none; flex-wrap: wrap; gap: 10px; justify-content: center;
      width: 100%; max-width: 480px; padding: 12px;
      background: var(--cream-2); border: 2px dashed var(--pink); border-radius: var(--radius-lg);
    }
    #stickerTray::before {
      content: 'Tempel stiker ✦'; flex-basis: 100%; text-align: center;
      font-family: var(--font-display); font-size: .82rem; color: var(--brown-soft);
    }
    .sticker-btn {
      cursor: pointer; width: 58px; height: 58px; padding: 5px;
      background: var(--white); border: 2px solid var(--border); border-radius: 16px;
      transition: transform .16s ease, border-color .16s ease;
    }
    .sticker-btn:hover { transform: translateY(-3px) rotate(-3deg); border-color: var(--pink); }
    .sticker-btn:focus-visible { outline: 2px solid var(--outline); outline-offset: 2px; box-shadow: var(--ring); }
    .sticker-btn img { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* ── kontrol ── */
    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 1rem;
      display: inline-flex; align-items: center; gap: 9px;
      border: 2px solid var(--outline); border-radius: var(--radius-pill); padding: 12px 24px;
      color: var(--brown); background: var(--white);
      box-shadow: var(--shadow-sticker); transition: transform .18s ease, background .18s ease;
    }
    .btn svg { width: 20px; height: 20px; }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid var(--outline); outline-offset: 2px; box-shadow: var(--ring), var(--shadow-sticker); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--pink); }
    .btn-primary:hover { background: var(--pink-soft); }
    .btn-icon { padding: 12px; }

    .status { margin: 2px 0 0; text-align: center; color: var(--brown-soft); font-size: .9rem; max-width: 460px; }

    /* ── info card ── */
    .info .greeter {
      display: block; width: 100%; border-radius: var(--radius); margin-bottom: 12px;
      border: 2px solid var(--outline);
    }
    .info h3 { margin: 4px 0 6px; font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; }
    .info p { margin: 0; font-size: .86rem; color: var(--brown-soft); line-height: 1.5; }

    /* ── responsif ── */
    @media (max-width: 1024px) {
      main.studio { grid-template-columns: 200px 1fr; }
      .info { display: none; }
    }
    @media (max-width: 720px) {
      .app-header { padding: 14px 18px; }
      main.studio { grid-template-columns: 1fr; padding: 4px 14px 24px; gap: 14px; }
      #templateList { flex-direction: row; overflow-x: auto; padding-bottom: 6px; }
      .tpl-btn { flex: 0 0 auto; width: 132px; }
      .tpl-thumb { height: 116px; }
      #countdown { font-size: 6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <img class="brand-logo" src="assets/brand/logo-polara.png" alt="Polara" />
    <span class="brand-tag">share the fun</span>
  </header>

  <main class="studio">
    <aside class="panel picker" aria-label="Pilih frame">
      <h2 class="panel-title"><span class="star">✦</span> Pilih Frame</h2>
      <div id="templateList"></div>
    </aside>

    <section id="stage">
      <div class="stage-card">
        <div id="cameraWrap">
          <video id="video" autoplay playsinline muted width="460" height="575"></video>
          <div id="cameraOverlay">
            <img src="assets/mascot/mascot-poca-hero.png" alt="" aria-hidden="true" />
            <p id="camMsg">Menyalakan kamera…</p>
          </div>
          <div id="countdown"></div>
        </div>
        <div id="canvasScale"></div>
      </div>

      <div id="stickerTray"></div>

      <div class="controls">
        <button class="btn btn-primary" id="snapBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.2"/></svg>
          Jepret
        </button>
        <button class="btn" id="retakeBtn" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Ulangi
        </button>
        <button class="btn btn-primary" id="downloadBtn" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Simpan
        </button>
        <button class="btn btn-icon" id="flipBtn" title="Ganti kamera" aria-label="Ganti kamera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>

      <p class="status" id="status" role="status" aria-live="polite">Pilih frame, lalu jepret. (Browser bakal minta izin kamera.)</p>
    </section>

    <aside class="panel info" aria-label="Info privasi">
      <img class="greeter" src="assets/mascot/mascot-poca-hero.png" alt="Poca, maskot Polara" />
      <h3>Privasi dulu ✦</h3>
      <p>Fotomu nggak dikirim ke mana-mana — semua diproses di HP/browser-mu sendiri. Hasil tinggal disimpan.</p>
    </aside>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
