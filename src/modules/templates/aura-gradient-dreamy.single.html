<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>Polara Template — Aura Gradient Dreamy Single</title>

  <!--
    Template: Aura Gradient Dreamy Single
    Type: CSS-heavy soft gradient photobooth template
    Fonts: Fredoka, Nunito, Space Mono
    Canvas: 1080 × 1350 px
    Slots: 1 photo slot
    Output target: PNG export from Polara compositor

    Recommended file location:
    C:\HenryDev\1HenryDev\polara\src\modules\templates\aura-gradient-dreamy.single.html

    Asset requirement:
    - No required PNG assets.
    - Aura blobs, glow, bokeh, border, and labels are CSS-based.
    - Designed as a clean IG-friendly frame, softer than Purikura/Y2K.

    Optional:
    - You can add a small Polara/Poca watermark asset later if needed.
    - Current .ph-brand uses clean CSS text.

    Template contract:
    - .ph-canvas
    - .ph-slot[data-slot="1"]
    - .ph-caption
    - .ph-date
    - .ph-brand
    - .ph-sticker-layer

    No JavaScript. No framework.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #fff8ef;
      --white: #ffffff;

      --pink: #ffc6dc;
      --pink-deep: #ff86b8;
      --peach: #ffd6b0;
      --butter: #ffe79a;
      --mint: #bbf2df;
      --sky: #b9e8ff;
      --aqua: #83d9ff;
      --lavender: #cdbdff;
      --violet: #a88bff;

      --ink: #493343;
      --muted: #8a7181;
      --line: rgba(73, 51, 67, 0.14);
      --soft-line: rgba(255, 255, 255, 0.58);
      --shadow: rgba(73, 51, 67, 0.16);
      --glow: rgba(255, 255, 255, 0.52);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #f2eef9;
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .ph-canvas {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 198, 220, 0.9) 0 11%, transparent 25%),
        radial-gradient(circle at 78% 18%, rgba(185, 232, 255, 0.9) 0 12%, transparent 27%),
        radial-gradient(circle at 22% 80%, rgba(187, 242, 223, 0.88) 0 13%, transparent 30%),
        radial-gradient(circle at 83% 82%, rgba(205, 189, 255, 0.9) 0 15%, transparent 32%),
        linear-gradient(145deg, #fff8ef 0%, #fff1fa 32%, #edf8ff 66%, #f3efff 100%);
      box-shadow: 0 30px 90px rgba(73, 51, 67, 0.18);
    }

    .ph-canvas::before {
      content: "";
      position: absolute;
      inset: -100px;
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
      background:
        radial-gradient(ellipse at 50% 28%, rgba(255,255,255,0.75) 0 12%, transparent 35%),
        radial-gradient(ellipse at 28% 42%, rgba(255, 134, 184, 0.36) 0 10%, transparent 30%),
        radial-gradient(ellipse at 72% 46%, rgba(131, 217, 255, 0.36) 0 10%, transparent 30%),
        radial-gradient(ellipse at 50% 72%, rgba(168, 139, 255, 0.24) 0 12%, transparent 35%);
      filter: blur(8px);
    }

    .ph-canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.62) 0 3px, transparent 3.8px),
        radial-gradient(circle, rgba(255, 134, 184, 0.18) 0 2px, transparent 2.8px),
        linear-gradient(135deg, rgba(255,255,255,0.18) 0 1px, transparent 1px);
      background-size: 86px 86px, 54px 54px, 38px 38px;
      background-position: 20px 18px, 0 40px, 0 0;
      opacity: 0.62;
      mix-blend-mode: screen;
    }

    .outer-frame {
      position: absolute;
      inset: 42px;
      z-index: 2;
      border-radius: 72px;
      border: 8px solid rgba(255,255,255,0.72);
      box-shadow:
        inset 0 0 0 3px rgba(255, 134, 184, 0.13),
        inset 0 0 70px rgba(255,255,255,0.36),
        0 24px 70px rgba(73, 51, 67, 0.12);
      pointer-events: none;
    }

    .outer-frame::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 56px;
      border: 2px dashed rgba(73, 51, 67, 0.16);
      pointer-events: none;
    }

    .aura-orb {
      position: absolute;
      z-index: 2;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(1px);
      opacity: 0.92;
      mix-blend-mode: screen;
    }

    .orb-1 {
      width: 360px;
      height: 360px;
      left: -110px;
      top: 190px;
      background: radial-gradient(circle, rgba(255, 134, 184, 0.72), transparent 66%);
    }

    .orb-2 {
      width: 420px;
      height: 420px;
      right: -140px;
      top: 310px;
      background: radial-gradient(circle, rgba(131, 217, 255, 0.72), transparent 68%);
    }

    .orb-3 {
      width: 420px;
      height: 420px;
      left: -120px;
      bottom: 120px;
      background: radial-gradient(circle, rgba(187, 242, 223, 0.68), transparent 68%);
    }

    .orb-4 {
      width: 460px;
      height: 460px;
      right: -120px;
      bottom: 56px;
      background: radial-gradient(circle, rgba(168, 139, 255, 0.62), transparent 68%);
    }

    .top-copy {
      position: absolute;
      left: 112px;
      right: 112px;
      top: 76px;
      z-index: 8;
      display: grid;
      gap: 10px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 auto;
      width: max-content;
      max-width: 100%;
      padding: 9px 20px;
      border: 2px solid rgba(73, 51, 67, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 24px rgba(73, 51, 67, 0.08);
      backdrop-filter: blur(12px);
      font-family: "Space Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .template-title {
      margin: 0;
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 70px;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--ink);
      text-shadow:
        0 4px 0 rgba(255,255,255,0.7),
        0 14px 34px rgba(73, 51, 67, 0.12);
    }

    .template-title span {
      background: linear-gradient(90deg, var(--pink-deep), var(--aqua), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .template-subtitle {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: var(--muted);
    }

    .ph-slot-wrap {
      position: absolute;
      left: 116px;
      top: 266px;
      width: 848px;
      height: 830px;
      z-index: 5;
      padding: 18px;
      border-radius: 64px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,255,255,0.5)),
        linear-gradient(135deg, rgba(255,198,220,0.28), rgba(185,232,255,0.26), rgba(205,189,255,0.24));
      border: 4px solid rgba(255,255,255,0.86);
      box-shadow:
        0 30px 82px rgba(73, 51, 67, 0.18),
        inset 0 0 0 2px rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
    }

    .ph-slot-wrap::before {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 78px;
      background:
        linear-gradient(90deg, rgba(255,134,184,0.55), rgba(131,217,255,0.55), rgba(168,139,255,0.5), rgba(255,214,176,0.46));
      z-index: -1;
      filter: blur(10px);
      opacity: 0.82;
    }

    .ph-slot {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 48px;
      border: 4px solid rgba(73, 51, 67, 0.1);
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.72), transparent 28%),
        radial-gradient(circle at 75% 80%, rgba(255,255,255,0.54), transparent 30%),
        linear-gradient(135deg, rgba(255,198,220,0.5), rgba(185,232,255,0.42), rgba(205,189,255,0.42));
      display: grid;
      place-items: center;
    }

    .ph-slot::before {
      content: "FOTO 1";
      position: absolute;
      z-index: 1;
      padding: 18px 30px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      border: 3px solid rgba(73, 51, 67, 0.1);
      color: rgba(73, 51, 67, 0.42);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 0.06em;
      backdrop-filter: blur(10px);
    }

    .ph-slot img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.03) contrast(1.02) brightness(1.03);
    }

    .ph-slot::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 12%, rgba(255,255,255,0.3), transparent 28%),
        radial-gradient(circle at 84% 88%, rgba(255,255,255,0.2), transparent 30%);
      mix-blend-mode: screen;
    }

    .bottom-panel {
      position: absolute;
      left: 100px;
      right: 100px;
      bottom: 74px;
      height: 154px;
      z-index: 8;
      border-radius: 42px;
      border: 4px solid rgba(255,255,255,0.74);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.58), rgba(255,255,255,0.34));
      box-shadow: 0 20px 54px rgba(73, 51, 67, 0.12);
      backdrop-filter: blur(16px);
    }

    .ph-caption {
      position: absolute;
      left: 130px;
      right: 130px;
      bottom: 156px;
      z-index: 10;
      min-height: 56px;
      padding: 12px 26px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.54);
      box-shadow: 0 14px 32px rgba(73, 51, 67, 0.1);
      backdrop-filter: blur(14px);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 34px;
      font-weight: 700;
      text-align: center;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ph-date {
      position: absolute;
      left: 134px;
      bottom: 104px;
      z-index: 10;
      font-family: "Space Mono", monospace;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .ph-brand {
      position: absolute;
      right: 134px;
      bottom: 96px;
      z-index: 10;
      padding: 10px 16px;
      border-radius: 999px;
      border: 2px solid rgba(73, 51, 67, 0.1);
      background: rgba(255,255,255,0.5);
      box-shadow: 0 10px 24px rgba(73, 51, 67, 0.08);
      backdrop-filter: blur(12px);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
    }

    .ph-sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    .bubble-label {
      position: absolute;
      z-index: 9;
      pointer-events: none;
      user-select: none;
      padding: 12px 20px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.78);
      background: rgba(255,255,255,0.48);
      box-shadow: 0 14px 30px rgba(73, 51, 67, 0.1);
      backdrop-filter: blur(12px);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 25px;
      font-weight: 700;
      color: var(--ink);
    }

    .label-1 {
      left: 58px;
      top: 350px;
      transform: rotate(-9deg);
    }

    .label-2 {
      right: 54px;
      top: 706px;
      transform: rotate(8deg);
    }

    .label-3 {
      left: 76px;
      top: 1050px;
      transform: rotate(7deg);
    }

    .float-icon {
      position: absolute;
      z-index: 7;
      pointer-events: none;
      user-select: none;
      font-family: "Fredoka", sans-serif;
      filter: drop-shadow(0 8px 12px rgba(73, 51, 67, 0.08));
    }

    .sparkle {
      font-size: 56px;
      line-height: 1;
      color: var(--white);
      -webkit-text-stroke: 4px rgba(73, 51, 67, 0.08);
      paint-order: stroke fill;
    }

    .star-pink { color: var(--pink-deep); }
    .star-blue { color: var(--aqua); }
    .star-violet { color: var(--violet); }
    .heart { font-size: 60px; color: var(--pink-deep); -webkit-text-stroke: 4px var(--white); paint-order: stroke fill; }

    .s1 { left: 84px; top: 154px; transform: rotate(-12deg); }
    .s2 { right: 82px; top: 218px; transform: rotate(18deg) scale(0.85); }
    .s3 { left: 64px; bottom: 288px; transform: rotate(15deg) scale(0.72); }
    .s4 { right: 82px; bottom: 246px; transform: rotate(-14deg) scale(0.74); }
    .h1 { left: 76px; top: 814px; transform: rotate(-13deg) scale(0.72); }
    .h2 { right: 80px; top: 1036px; transform: rotate(10deg) scale(0.62); }

    .soft-ring {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.42);
      box-shadow: inset 0 0 40px rgba(255,255,255,0.18), 0 0 40px rgba(255,255,255,0.2);
    }

    .ring-1 {
      width: 210px;
      height: 210px;
      left: 72px;
      top: 612px;
      transform: rotate(16deg);
    }

    .ring-2 {
      width: 260px;
      height: 260px;
      right: 46px;
      top: 466px;
      transform: rotate(-8deg);
    }

    .ring-3 {
      width: 220px;
      height: 220px;
      right: 156px;
      bottom: 124px;
      transform: rotate(10deg);
    }

    @media print {
      body {
        padding: 0;
        background: transparent;
      }

      .ph-canvas {
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div class="ph-canvas template-aura-gradient-dreamy" role="img" aria-label="Polara Aura Gradient Dreamy photobooth frame">
    <div class="outer-frame"></div>

    <div class="aura-orb orb-1"></div>
    <div class="aura-orb orb-2"></div>
    <div class="aura-orb orb-3"></div>
    <div class="aura-orb orb-4"></div>

    <div class="soft-ring ring-1"></div>
    <div class="soft-ring ring-2"></div>
    <div class="soft-ring ring-3"></div>

    <header class="top-copy">
      <p class="eyebrow">soft aura edition</p>
      <h1 class="template-title">Aura <span>Dream</span></h1>
      <p class="template-subtitle">glowy, clean, and ready for your feed</p>
    </header>

    <div class="ph-slot-wrap">
      <div class="ph-slot" data-slot="1"></div>
    </div>

    <div class="bubble-label label-1">glow</div>
    <div class="bubble-label label-2">soft snap</div>
    <div class="bubble-label label-3">dreamy</div>

    <div class="float-icon sparkle star-pink s1">✦</div>
    <div class="float-icon sparkle star-blue s2">✦</div>
    <div class="float-icon sparkle star-violet s3">✦</div>
    <div class="float-icon sparkle star-blue s4">✦</div>
    <div class="float-icon heart h1">♥</div>
    <div class="float-icon heart h2">♥</div>

    <div class="bottom-panel"></div>
    <div class="ph-caption">Nama · Aura Moment</div>
    <div class="ph-date">02 Jul 2026</div>
    <div class="ph-brand">made with Polara ✦</div>

    <div class="ph-sticker-layer"></div>
  </div>
</body>
</html>
