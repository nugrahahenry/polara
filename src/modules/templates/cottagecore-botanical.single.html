<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>Polara Template — Cottagecore Botanical Single</title>

  <!--
    Template: Cottagecore Botanical Single
    Type: CSS-heavy botanical / garden photobooth template
    Fonts: Cormorant Garamond, Nunito, Space Mono
    Canvas: 1080 × 1350 px
    Slots: 1 photo slot
    Output target: PNG export from Polara compositor

    Recommended file location:
    C:\HenryDev\1HenryDev\polara\src\modules\templates\cottagecore-botanical.single.html

    Asset requirement:
    - No required PNG assets.
    - Botanical leaves, flowers, paper texture, postcard labels, and borders are CSS-based.
    - Designed as a soft natural option: earthy, calm, romantic, IG/Pinterest-friendly.

    Optional:
    - You can later replace CSS flowers with illustrated PNG/SVG assets.
    - Current .ph-brand uses CSS text.

    Template contract:
    - .ph-canvas
    - .ph-slot[data-slot="1"]
    - .ph-caption
    - .ph-date
    - .ph-brand
    - .ph-sticker-layer

    No JavaScript. No framework.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #fff7e8;
      --paper: #f4e8d2;
      --paper-deep: #dfc9a7;
      --sage: #8aa87b;
      --sage-dark: #526f49;
      --olive: #6f7f48;
      --moss: #3f5c38;
      --dusty-rose: #d99a9f;
      --rose: #b96f7c;
      --terracotta: #c98258;
      --peach: #f1c4a6;
      --butter: #f4dd91;
      --ink: #3e3428;
      --muted: #7c6a58;
      --white: #fffdf6;
      --line: rgba(62, 52, 40, 0.18);
      --line-strong: rgba(62, 52, 40, 0.38);
      --shadow: rgba(62, 52, 40, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #e8ddcc;
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .ph-canvas {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 12%, rgba(217, 154, 159, 0.38) 0 12%, transparent 30%),
        radial-gradient(circle at 84% 18%, rgba(138, 168, 123, 0.38) 0 14%, transparent 32%),
        radial-gradient(circle at 18% 86%, rgba(241, 196, 166, 0.42) 0 13%, transparent 30%),
        radial-gradient(circle at 82% 86%, rgba(244, 221, 145, 0.34) 0 15%, transparent 32%),
        linear-gradient(145deg, var(--cream) 0%, var(--paper) 52%, #ead8ba 100%);
      box-shadow: 0 30px 90px rgba(62, 52, 40, 0.22);
    }

    .ph-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image:
        radial-gradient(circle, rgba(62,52,40,0.18) 0 1px, transparent 1.4px),
        linear-gradient(90deg, rgba(62,52,40,0.045) 1px, transparent 1px),
        linear-gradient(rgba(62,52,40,0.035) 1px, transparent 1px);
      background-size: 10px 10px, 36px 36px, 36px 36px;
      background-position: 0 0, 8px 0, 0 8px;
      mix-blend-mode: multiply;
    }

    .ph-canvas::after {
      content: "";
      position: absolute;
      inset: 34px;
      z-index: 1;
      border: 5px double rgba(62,52,40,0.32);
      border-radius: 42px;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 12px rgba(255,253,246,0.26),
        inset 0 0 80px rgba(138,168,123,0.12);
    }

    .postcard {
      position: absolute;
      inset: 62px;
      z-index: 2;
      display: grid;
      grid-template-rows: 150px 1fr 150px;
      gap: 22px;
    }

    .top-copy {
      position: relative;
      z-index: 8;
      display: grid;
      place-items: center;
      text-align: center;
      padding-top: 8px;
    }

    .eyebrow {
      margin: 0 auto 10px;
      width: max-content;
      max-width: 100%;
      padding: 8px 18px;
      border: 2px solid rgba(62,52,40,0.18);
      border-radius: 999px;
      background: rgba(255,253,246,0.45);
      box-shadow: 0 10px 20px rgba(62,52,40,0.08);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .template-title {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 78px;
      line-height: 0.84;
      letter-spacing: -0.035em;
      font-weight: 700;
      color: var(--ink);
      text-shadow: 0 4px 0 rgba(255,253,246,0.64);
    }

    .template-title span {
      color: var(--sage-dark);
      font-style: italic;
    }

    .template-subtitle {
      margin: 14px 0 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--muted);
    }

    .photo-area {
      position: relative;
      z-index: 5;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .photo-card {
      position: relative;
      width: 834px;
      height: 810px;
      padding: 18px;
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,253,246,0.86), rgba(255,253,246,0.5));
      border: 4px solid rgba(62,52,40,0.22);
      box-shadow:
        0 28px 70px rgba(62,52,40,0.20),
        inset 0 0 0 3px rgba(255,253,246,0.48);
      transform: rotate(-0.8deg);
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: -15px;
      z-index: -1;
      border-radius: 46px;
      border: 2px dashed rgba(82,111,73,0.42);
      transform: rotate(1.4deg);
      pointer-events: none;
    }

    .photo-card::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -22px;
      width: 166px;
      height: 46px;
      transform: translateX(-50%) rotate(3deg);
      background: rgba(255,253,246,0.58);
      border: 1px solid rgba(62,52,40,0.14);
      box-shadow: 0 8px 18px rgba(62,52,40,0.12);
      pointer-events: none;
    }

    .ph-slot {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 24px;
      border: 3px solid rgba(62,52,40,0.22);
      background:
        radial-gradient(circle at 20% 16%, rgba(217,154,159,0.30), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(138,168,123,0.30), transparent 36%),
        repeating-linear-gradient(
          -45deg,
          rgba(255,253,246,0.48) 0 14px,
          rgba(244,232,210,0.4) 14px 28px
        );
      display: grid;
      place-items: center;
    }

    .ph-slot::before {
      content: "FOTO 1";
      position: absolute;
      z-index: 1;
      padding: 16px 28px;
      border-radius: 999px;
      background: rgba(255,253,246,0.68);
      border: 3px solid rgba(62,52,40,0.12);
      color: rgba(62,52,40,0.42);
      font-family: "Nunito", sans-serif;
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .ph-slot img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.96) contrast(1.02) brightness(1.03);
    }

    .ph-slot::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,253,246,0.18), transparent 28%),
        linear-gradient(180deg, rgba(255,253,246,0.08), rgba(138,168,123,0.08));
      mix-blend-mode: screen;
    }

    .bottom-panel {
      position: relative;
      z-index: 8;
      display: grid;
      grid-template-columns: 1fr 230px;
      gap: 22px;
      align-items: end;
      padding: 0 38px 12px;
    }

    .ph-caption {
      min-width: 0;
      padding: 14px 0 12px;
      border-top: 3px solid rgba(62,52,40,0.28);
      border-bottom: 3px solid rgba(62,52,40,0.28);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 48px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .caption-note {
      margin-top: 8px;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.09em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .meta {
      display: grid;
      justify-items: end;
      gap: 12px;
    }

    .ph-date {
      font-family: "Space Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: right;
    }

    .ph-brand {
      width: max-content;
      max-width: 230px;
      padding: 10px 14px;
      border: 2px solid rgba(62,52,40,0.18);
      border-radius: 999px;
      background: rgba(255,253,246,0.48);
      box-shadow: 0 10px 22px rgba(62,52,40,0.08);
      font-family: "Nunito", sans-serif;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
      color: var(--sage-dark);
      white-space: nowrap;
      transform: rotate(-1deg);
    }

    .ph-sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    /* Botanical CSS decorations */
    .leaf {
      position: absolute;
      z-index: 7;
      width: 34px;
      height: 82px;
      border-radius: 100% 0 100% 0;
      background:
        linear-gradient(135deg, rgba(255,253,246,0.18), transparent 32%),
        linear-gradient(180deg, var(--sage), var(--sage-dark));
      box-shadow: inset 0 0 0 1px rgba(62,52,40,0.08), 0 8px 16px rgba(62,52,40,0.12);
      transform-origin: bottom center;
      pointer-events: none;
    }

    .leaf::before {
      content: "";
      position: absolute;
      left: 48%;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: rgba(255,253,246,0.32);
      transform: rotate(8deg);
      border-radius: 999px;
    }

    .leaf.l1 { left: 86px; top: 260px; transform: rotate(-32deg); }
    .leaf.l2 { left: 124px; top: 316px; transform: rotate(-12deg) scale(0.86); }
    .leaf.l3 { left: 68px; top: 412px; transform: rotate(-52deg) scale(0.78); }
    .leaf.l4 { right: 92px; top: 258px; transform: rotate(36deg) scale(0.94); }
    .leaf.l5 { right: 132px; top: 326px; transform: rotate(14deg) scale(0.82); }
    .leaf.l6 { right: 72px; top: 430px; transform: rotate(54deg) scale(0.76); }
    .leaf.l7 { left: 104px; bottom: 260px; transform: rotate(-148deg) scale(0.88); }
    .leaf.l8 { right: 104px; bottom: 270px; transform: rotate(148deg) scale(0.88); }

    .flower {
      position: absolute;
      z-index: 9;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      pointer-events: none;
      filter: drop-shadow(0 10px 12px rgba(62,52,40,0.12));
    }

    .flower::before {
      content: "";
      position: absolute;
      inset: 28px;
      border-radius: 50%;
      background: var(--butter);
      box-shadow:
        0 -30px 0 10px var(--dusty-rose),
        28px -10px 0 10px var(--peach),
        18px 26px 0 10px var(--dusty-rose),
        -18px 26px 0 10px var(--rose),
        -28px -10px 0 10px var(--peach);
    }

    .flower::after {
      content: "";
      position: absolute;
      inset: 38px;
      border-radius: 50%;
      background: var(--terracotta);
      box-shadow: inset 0 0 0 2px rgba(62,52,40,0.12);
    }

    .f1 { left: 72px; top: 178px; transform: rotate(-8deg) scale(0.92); }
    .f2 { right: 70px; top: 172px; transform: rotate(12deg) scale(0.84); }
    .f3 { left: 74px; bottom: 196px; transform: rotate(16deg) scale(0.82); }
    .f4 { right: 72px; bottom: 190px; transform: rotate(-12deg) scale(0.9); }

    .mushroom {
      position: absolute;
      z-index: 8;
      width: 92px;
      height: 88px;
      pointer-events: none;
      filter: drop-shadow(0 10px 12px rgba(62,52,40,0.12));
    }

    .mushroom::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 0;
      width: 80px;
      height: 48px;
      border-radius: 80px 80px 24px 24px;
      background:
        radial-gradient(circle at 30% 30%, var(--cream) 0 7px, transparent 8px),
        radial-gradient(circle at 62% 26%, var(--cream) 0 6px, transparent 7px),
        var(--terracotta);
      border: 2px solid rgba(62,52,40,0.12);
    }

    .mushroom::after {
      content: "";
      position: absolute;
      left: 32px;
      top: 38px;
      width: 28px;
      height: 48px;
      border-radius: 12px 12px 18px 18px;
      background: var(--cream);
      border: 2px solid rgba(62,52,40,0.12);
    }

    .m1 { left: 128px; bottom: 356px; transform: rotate(-8deg) scale(0.82); }
    .m2 { right: 128px; bottom: 352px; transform: rotate(8deg) scale(0.76); }

    .postcard-label {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      padding: 10px 16px;
      border: 2px solid rgba(62,52,40,0.18);
      border-radius: 16px;
      background: rgba(255,253,246,0.52);
      box-shadow: 0 10px 22px rgba(62,52,40,0.08);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--sage-dark);
      text-transform: uppercase;
    }

    .label-1 {
      left: 74px;
      top: 566px;
      transform: rotate(-8deg);
    }

    .label-2 {
      right: 74px;
      top: 790px;
      transform: rotate(8deg);
    }

    .label-3 {
      left: 114px;
      bottom: 332px;
      transform: rotate(5deg);
    }

    .side-type {
      position: absolute;
      z-index: 6;
      font-family: "Space Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: rgba(62,52,40,0.42);
      writing-mode: vertical-rl;
      text-transform: uppercase;
    }

    .side-left {
      left: 22px;
      top: 324px;
    }

    .side-right {
      right: 22px;
      bottom: 324px;
      transform: rotate(180deg);
    }

    @media print {
      body {
        padding: 0;
        background: transparent;
      }

      .ph-canvas {
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div class="ph-canvas template-cottagecore-botanical" role="img" aria-label="Polara Cottagecore Botanical photobooth frame">
    <div class="side-type side-left">garden postcard edition</div>
    <div class="side-type side-right">soft botanical photobooth</div>

    <main class="postcard">
      <header class="top-copy">
        <p class="eyebrow">garden memory / soft living</p>
        <h1 class="template-title">Botanical <span>Daydream</span></h1>
        <p class="template-subtitle">earthy, gentle, and made for soft moments</p>
      </header>

      <section class="photo-area">
        <div class="photo-card">
          <div class="ph-slot" data-slot="1"></div>
        </div>
      </section>

      <footer class="bottom-panel">
        <div>
          <div class="ph-caption">Nama · Garden Moment</div>
          <div class="caption-note">For picnic dates, cafe corners, campus days, and sunny memories.</div>
        </div>

        <div class="meta">
          <div class="ph-date">02 Jul 2026</div>
          <div class="ph-brand">made with Polara</div>
        </div>
      </footer>
    </main>

    <div class="leaf l1"></div>
    <div class="leaf l2"></div>
    <div class="leaf l3"></div>
    <div class="leaf l4"></div>
    <div class="leaf l5"></div>
    <div class="leaf l6"></div>
    <div class="leaf l7"></div>
    <div class="leaf l8"></div>

    <div class="flower f1"></div>
    <div class="flower f2"></div>
    <div class="flower f3"></div>
    <div class="flower f4"></div>

    <div class="mushroom m1"></div>
    <div class="mushroom m2"></div>

    <div class="postcard-label label-1">slow snap</div>
    <div class="postcard-label label-2">soft aura</div>
    <div class="postcard-label label-3">bloom</div>

    <div class="ph-sticker-layer"></div>
  </div>
</body>
</html>
