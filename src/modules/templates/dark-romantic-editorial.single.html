<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>Polara Template — Dark Romantic Editorial Single</title>

  <!--
    Template: Dark Romantic Editorial Single
    Type: CSS-heavy moody / premium editorial photobooth template
    Fonts: Cormorant Garamond, Playfair Display, Space Mono
    Canvas: 1080 × 1350 px
    Slots: 1 photo slot
    Output target: PNG export from Polara compositor

    Recommended file location:
    C:\HenryDev\1HenryDev\polara\src\modules\templates\dark-romantic-editorial.single.html

    Asset requirement:
    - No required PNG assets.
    - Ornamental borders, gold accents, roses, vignette, and editorial labels are CSS-based.
    - Designed as a premium/moody option, not cute or sticker-heavy.

    Optional:
    - You can later replace the CSS brand stamp with a clean Polara logo asset.
    - Current .ph-brand uses CSS text.

    Template contract:
    - .ph-canvas
    - .ph-slot[data-slot="1"]
    - .ph-caption
    - .ph-date
    - .ph-brand
    - .ph-sticker-layer

    No JavaScript. No framework.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #080708;
      --navy: #101525;
      --navy-deep: #090d18;
      --burgundy: #4b1022;
      --burgundy-2: #711b34;
      --wine: #2b0b18;
      --forest: #10231d;

      --gold: #d8b56d;
      --gold-soft: #f0d894;
      --gold-dark: #8e6d35;
      --cream: #f4e7c8;
      --ivory: #fff3d6;

      --rose: #9a2948;
      --rose-soft: #c45a76;
      --ink: #fff3d6;
      --muted: rgba(244, 231, 200, 0.68);
      --line: rgba(216, 181, 109, 0.42);
      --line-soft: rgba(244, 231, 200, 0.18);
      --shadow: rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #161319;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .ph-canvas {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(113, 27, 52, 0.72) 0 14%, transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(16, 35, 29, 0.72) 0 16%, transparent 34%),
        radial-gradient(circle at 78% 86%, rgba(75, 16, 34, 0.58) 0 18%, transparent 34%),
        linear-gradient(145deg, var(--black) 0%, var(--wine) 34%, var(--navy-deep) 72%, #050506 100%);
      box-shadow: 0 34px 100px rgba(0,0,0,0.5);
    }

    .ph-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0 42%, rgba(0,0,0,0.5) 82%, rgba(0,0,0,0.82) 100%),
        repeating-linear-gradient(
          90deg,
          rgba(244,231,200,0.035) 0 1px,
          transparent 1px 28px
        );
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    .ph-canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        radial-gradient(circle, rgba(244,231,200,0.36) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(216,181,109,0.22) 0 1.2px, transparent 1.7px);
      background-size: 22px 22px, 52px 52px;
      background-position: 0 0, 12px 18px;
      mix-blend-mode: screen;
    }

    .outer-frame {
      position: absolute;
      inset: 44px;
      z-index: 2;
      border: 4px solid var(--line);
      box-shadow:
        0 0 0 1px rgba(244,231,200,0.12),
        inset 0 0 0 2px rgba(244,231,200,0.1),
        inset 0 0 80px rgba(216,181,109,0.08);
      pointer-events: none;
    }

    .outer-frame::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(216,181,109,0.32);
      pointer-events: none;
    }

    .corner {
      position: absolute;
      z-index: 4;
      width: 148px;
      height: 148px;
      pointer-events: none;
      border-color: var(--gold);
      filter: drop-shadow(0 0 12px rgba(216,181,109,0.26));
    }

    .corner::before,
    .corner::after {
      content: "";
      position: absolute;
      background: var(--gold);
      box-shadow: 0 0 16px rgba(216,181,109,0.25);
    }

    .corner::before {
      width: 100%;
      height: 3px;
    }

    .corner::after {
      width: 3px;
      height: 100%;
    }

    .corner-tl { left: 58px; top: 58px; }
    .corner-tr { right: 58px; top: 58px; transform: rotate(90deg); }
    .corner-br { right: 58px; bottom: 58px; transform: rotate(180deg); }
    .corner-bl { left: 58px; bottom: 58px; transform: rotate(270deg); }

    .top-editorial {
      position: absolute;
      left: 106px;
      right: 106px;
      top: 74px;
      z-index: 8;
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 auto;
      width: max-content;
      max-width: 100%;
      padding: 8px 20px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }

    .template-title {
      margin: 0;
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
      font-size: 72px;
      line-height: 0.88;
      letter-spacing: -0.045em;
      font-weight: 800;
      color: var(--ivory);
      text-shadow:
        0 8px 24px rgba(0,0,0,0.48),
        0 0 18px rgba(216,181,109,0.14);
    }

    .template-title span {
      color: var(--gold-soft);
      font-style: italic;
    }

    .template-subtitle {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 28px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .photo-stage {
      position: absolute;
      left: 124px;
      top: 276px;
      width: 832px;
      height: 792px;
      z-index: 5;
      padding: 20px;
      background:
        linear-gradient(135deg, rgba(216,181,109,0.18), rgba(244,231,200,0.08)),
        rgba(0,0,0,0.24);
      border: 2px solid var(--line);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.44),
        inset 0 0 0 1px rgba(244,231,200,0.11),
        inset 0 0 56px rgba(216,181,109,0.07);
    }

    .photo-stage::before {
      content: "";
      position: absolute;
      inset: -16px;
      border: 1px solid rgba(216,181,109,0.28);
      z-index: -1;
    }

    .photo-stage::after {
      content: "";
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: -14px;
      height: 20px;
      background: linear-gradient(90deg, transparent, rgba(216,181,109,0.46), transparent);
      filter: blur(18px);
      opacity: 0.7;
      pointer-events: none;
    }

    .ph-slot {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 5px solid rgba(244,231,200,0.2);
      background:
        radial-gradient(circle at 20% 16%, rgba(216,181,109,0.20), transparent 34%),
        radial-gradient(circle at 82% 76%, rgba(154,41,72,0.26), transparent 34%),
        linear-gradient(135deg, rgba(244,231,200,0.12), rgba(0,0,0,0.54));
      display: grid;
      place-items: center;
    }

    .ph-slot::before {
      content: "FOTO 1";
      position: absolute;
      z-index: 1;
      padding: 14px 26px;
      border: 1px solid rgba(244,231,200,0.34);
      background: rgba(8, 7, 8, 0.56);
      color: rgba(244,231,200,0.54);
      font-family: "Space Mono", monospace;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .ph-slot img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter:
        contrast(1.06)
        saturate(0.84)
        brightness(0.94);
    }

    .ph-slot::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0 54%, rgba(0,0,0,0.46) 100%),
        linear-gradient(180deg, rgba(216,181,109,0.1), transparent 36%, rgba(75,16,34,0.18));
      mix-blend-mode: multiply;
    }

    .rose {
      position: absolute;
      z-index: 9;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, var(--rose-soft) 0 10%, transparent 11%),
        radial-gradient(ellipse at 38% 38%, var(--rose) 0 22%, transparent 23%),
        radial-gradient(ellipse at 62% 38%, #6e1930 0 22%, transparent 23%),
        radial-gradient(ellipse at 42% 62%, #7b1d37 0 24%, transparent 25%),
        radial-gradient(ellipse at 64% 64%, #4b1022 0 24%, transparent 25%),
        radial-gradient(circle at 50% 50%, #2b0b18 0 58%, transparent 59%);
      box-shadow:
        0 20px 32px rgba(0,0,0,0.34),
        0 0 0 2px rgba(216,181,109,0.16);
      opacity: 0.92;
    }

    .rose::before {
      content: "";
      position: absolute;
      width: 94px;
      height: 26px;
      left: 86px;
      top: 82px;
      border-radius: 50%;
      background: linear-gradient(90deg, #173d30, #0e241d);
      transform: rotate(25deg);
      box-shadow: inset 0 0 0 1px rgba(216,181,109,0.12);
    }

    .rose-1 {
      left: 72px;
      top: 272px;
      transform: rotate(-18deg) scale(0.92);
    }

    .rose-2 {
      right: 70px;
      bottom: 254px;
      transform: rotate(18deg) scale(0.86);
    }

    .gold-label {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      padding: 12px 18px;
      border: 1px solid var(--line);
      background: rgba(8,7,8,0.58);
      box-shadow:
        0 12px 28px rgba(0,0,0,0.26),
        inset 0 0 0 1px rgba(244,231,200,0.08);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--gold-soft);
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .label-1 {
      left: 80px;
      top: 510px;
      transform: rotate(-6deg);
    }

    .label-2 {
      right: 76px;
      top: 792px;
      transform: rotate(6deg);
    }

    .ornament {
      position: absolute;
      z-index: 6;
      pointer-events: none;
      color: var(--gold);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 76px;
      line-height: 1;
      opacity: 0.7;
      text-shadow: 0 0 18px rgba(216,181,109,0.22);
    }

    .orn-1 {
      left: 102px;
      bottom: 192px;
      transform: rotate(-8deg);
    }

    .orn-2 {
      right: 102px;
      top: 202px;
      transform: rotate(8deg);
    }

    .bottom-editorial {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 76px;
      z-index: 8;
      display: grid;
      grid-template-columns: 1fr 242px;
      gap: 26px;
      align-items: end;
    }

    .caption-area {
      min-width: 0;
    }

    .ph-caption {
      position: relative;
      z-index: 9;
      padding: 14px 0 12px;
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif;
      font-size: 46px;
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ivory);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 8px 20px rgba(0,0,0,0.42);
    }

    .caption-note {
      margin-top: 10px;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .meta-area {
      display: grid;
      justify-items: end;
      gap: 12px;
    }

    .ph-date {
      position: relative;
      z-index: 9;
      font-family: "Space Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--gold-soft);
      text-transform: uppercase;
      text-align: right;
    }

    .ph-brand {
      position: relative;
      z-index: 9;
      width: max-content;
      max-width: 240px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(8,7,8,0.48);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.28),
        inset 0 0 0 1px rgba(244,231,200,0.08);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.09em;
      color: var(--gold-soft);
      text-transform: uppercase;
      white-space: nowrap;
      transform: rotate(-1deg);
    }

    .side-type {
      position: absolute;
      z-index: 6;
      font-family: "Space Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(244,231,200,0.48);
      writing-mode: vertical-rl;
      text-transform: uppercase;
    }

    .side-left {
      left: 24px;
      top: 314px;
    }

    .side-right {
      right: 24px;
      bottom: 314px;
      transform: rotate(180deg);
    }

    .ph-sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    @media print {
      body {
        padding: 0;
        background: transparent;
      }

      .ph-canvas {
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div class="ph-canvas template-dark-romantic-editorial" role="img" aria-label="Polara Dark Romantic Editorial photobooth frame">
    <div class="outer-frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-br"></div>
    <div class="corner corner-bl"></div>

    <div class="side-type side-left">midnight editorial frame</div>
    <div class="side-type side-right">polara after dark edition</div>

    <header class="top-editorial">
      <p class="eyebrow">after dark / special portrait</p>
      <h1 class="template-title">Dark <span>Romance</span></h1>
      <p class="template-subtitle">moody, cinematic, and softly dramatic</p>
    </header>

    <div class="photo-stage">
      <div class="ph-slot" data-slot="1"></div>
    </div>

    <div class="rose rose-1"></div>
    <div class="rose rose-2"></div>

    <div class="gold-label label-1">soft flash</div>
    <div class="gold-label label-2">editorial mood</div>

    <div class="ornament orn-1">❦</div>
    <div class="ornament orn-2">❦</div>

    <footer class="bottom-editorial">
      <div class="caption-area">
        <div class="ph-caption">Nama · Midnight Portrait</div>
        <div class="caption-note">For cafe nights, fashion shots, couples, and after-event memories.</div>
      </div>

      <div class="meta-area">
        <div class="ph-date">02 Jul 2026</div>
        <div class="ph-brand">made with Polara</div>
      </div>
    </footer>

    <div class="ph-sticker-layer"></div>
  </div>
</body>
</html>
