<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=720, initial-scale=1.0" />
  <title>Polara Template — Live Frame Cinemagraph Strip</title>

  <!--
    Template: Live Frame / Cinemagraph Strip
    Type: CSS-heavy live-frame inspired photobooth strip template
    Fonts: Fredoka, Nunito, Space Mono
    Canvas: 720 × 1800 px
    Slots: 3 vertical photo slots
    Output target: PNG export from Polara compositor

    Recommended file location:
    C:\HenryDev\1HenryDev\polara\src\modules\templates\live-frame-cinemagraph.strip.html

    Asset requirement:
    - No required PNG assets.
    - Motion trails, live badge, progress timeline, waveform, glow, and UI controls are CSS-based.
    - This is a static visual template for MVP.
    - Real GIF/video/cinemagraph export can be handled later by the Polara engine.

    Template contract:
    - .ph-canvas
    - .ph-slot[data-slot="1"], .ph-slot[data-slot="2"], .ph-slot[data-slot="3"]
    - .ph-caption
    - .ph-date
    - .ph-brand
    - .ph-sticker-layer

    No JavaScript. No framework.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #080913;
      --deep: #0f1025;
      --panel: rgba(255,255,255,0.10);

      --pink: #ff7cc8;
      --pink-deep: #ff3fa8;
      --blue: #77d9ff;
      --cyan: #35f1ff;
      --purple: #a58bff;
      --violet: #7e62ff;
      --mint: #83ffd7;
      --yellow: #ffe477;
      --white: #ffffff;

      --ink: #ffffff;
      --muted: rgba(255,255,255,0.68);
      --line: rgba(255,255,255,0.20);
      --line-strong: rgba(255,255,255,0.38);
      --shadow: rgba(0,0,0,0.44);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #11121f;
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .ph-canvas {
      position: relative;
      width: 720px;
      height: 1800px;
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 10%, rgba(255,124,200,0.38) 0 13%, transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(119,217,255,0.35) 0 13%, transparent 30%),
        radial-gradient(circle at 20% 88%, rgba(131,255,215,0.28) 0 13%, transparent 30%),
        radial-gradient(circle at 80% 84%, rgba(165,139,255,0.36) 0 16%, transparent 34%),
        linear-gradient(180deg, #090a18 0%, #101127 52%, #080913 100%);
      box-shadow: 0 34px 100px rgba(0,0,0,0.5);
    }

    .ph-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.32) 0 1px, transparent 1.4px);
      background-size: 44px 44px, 44px 44px, 32px 32px;
      background-position: 0 0, 0 0, 10px 12px;
      opacity: 0.42;
      mix-blend-mode: screen;
    }

    .ph-canvas::after {
      content: "";
      position: absolute;
      inset: -80px;
      z-index: 1;
      pointer-events: none;
      background:
        conic-gradient(
          from 210deg at 50% 50%,
          rgba(255,124,200,0.18),
          rgba(53,241,255,0.14),
          rgba(165,139,255,0.18),
          rgba(131,255,215,0.10),
          rgba(255,124,200,0.18)
        );
      filter: blur(18px);
      opacity: 0.74;
      mix-blend-mode: screen;
    }

    .outer-frame {
      position: absolute;
      inset: 28px;
      z-index: 2;
      border-radius: 36px;
      border: 3px solid rgba(255,255,255,0.28);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.07),
        inset 0 0 70px rgba(119,217,255,0.08),
        0 0 34px rgba(53,241,255,0.14);
      pointer-events: none;
    }

    .top-bar {
      position: absolute;
      left: 52px;
      right: 52px;
      top: 54px;
      height: 116px;
      z-index: 8;
      border-radius: 32px;
      border: 2px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      box-shadow:
        0 20px 42px rgba(0,0,0,0.22),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: 128px 1fr 128px;
      gap: 18px;
      align-items: center;
      padding: 16px 20px;
    }

    .live-badge {
      height: 64px;
      border-radius: 999px;
      background: rgba(255,63,168,0.18);
      border: 2px solid rgba(255,124,200,0.48);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: "Space Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--white);
      text-transform: uppercase;
      box-shadow: 0 0 22px rgba(255,63,168,0.18);
    }

    .live-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--pink-deep);
      box-shadow: 0 0 0 6px rgba(255,63,168,0.18), 0 0 18px rgba(255,63,168,0.68);
    }

    .title-wrap {
      text-align: center;
      min-width: 0;
    }

    .template-title {
      margin: 0;
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 42px;
      line-height: 0.88;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--white);
      text-shadow:
        0 0 16px rgba(119,217,255,0.36),
        0 0 30px rgba(255,124,200,0.18);
    }

    .template-title span {
      color: var(--cyan);
    }

    .template-subtitle {
      margin: 8px 0 0;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .timer {
      height: 64px;
      border-radius: 999px;
      background: rgba(119,217,255,0.14);
      border: 2px solid rgba(119,217,255,0.42);
      display: grid;
      place-items: center;
      font-family: "Space Mono", monospace;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(53,241,255,0.44);
    }

    .strip-stack {
      position: absolute;
      top: 210px;
      left: 70px;
      right: 70px;
      bottom: 292px;
      z-index: 5;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 30px;
    }

    .live-frame {
      position: relative;
      padding: 12px;
      border-radius: 32px;
      border: 2px solid rgba(255,255,255,0.24);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06)),
        rgba(8,9,19,0.5);
      box-shadow:
        0 24px 44px rgba(0,0,0,0.32),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      overflow: visible;
    }

    .live-frame::before {
      content: "";
      position: absolute;
      inset: -10px;
      z-index: -1;
      border-radius: 42px;
      background:
        linear-gradient(120deg, rgba(255,124,200,0.55), rgba(53,241,255,0.48), rgba(165,139,255,0.48), rgba(131,255,215,0.36));
      filter: blur(14px);
      opacity: 0.54;
      pointer-events: none;
    }

    .live-frame::after {
      content: "";
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: -8px;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(53,241,255,0.6), rgba(255,124,200,0.56), transparent);
      filter: blur(10px);
      opacity: 0.52;
      pointer-events: none;
    }

    .frame-label {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 7;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(8,9,19,0.56);
      border: 1px solid rgba(255,255,255,0.24);
      font-family: "Space Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.78);
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .motion-tag {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 7;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(53,241,255,0.14);
      border: 1px solid rgba(53,241,255,0.34);
      font-family: "Space Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: var(--cyan);
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .motion-tag span {
      width: 5px;
      height: 18px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 10px rgba(53,241,255,0.5);
    }

    .motion-tag span:nth-child(2) { height: 12px; opacity: 0.7; }
    .motion-tag span:nth-child(3) { height: 22px; opacity: 0.9; }

    .ph-slot {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,0.26);
      background:
        radial-gradient(circle at 20% 12%, rgba(255,124,200,0.26), transparent 34%),
        radial-gradient(circle at 82% 82%, rgba(119,217,255,0.24), transparent 36%),
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(8,9,19,0.78));
      display: grid;
      place-items: center;
      box-shadow:
        inset 0 0 42px rgba(0,0,0,0.38),
        0 0 20px rgba(53,241,255,0.10);
    }

    .ph-slot::before {
      content: attr(data-label);
      position: absolute;
      z-index: 1;
      padding: 12px 22px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.24);
      background: rgba(8,9,19,0.48);
      color: rgba(255,255,255,0.52);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      backdrop-filter: blur(8px);
    }

    .ph-slot img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.06) contrast(1.03) brightness(1.02);
    }

    .ph-slot::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.035) 0 2px,
          transparent 2px 8px
        ),
        linear-gradient(90deg, rgba(255,124,200,0.12), transparent 22%, transparent 78%, rgba(53,241,255,0.12));
      mix-blend-mode: screen;
    }

    .trail {
      position: absolute;
      z-index: 4;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(1px);
      opacity: 0.66;
      mix-blend-mode: screen;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent);
    }

    .trail-1 { width: 180px; height: 8px; left: 32px; top: 38%; transform: rotate(-8deg); }
    .trail-2 { width: 150px; height: 7px; right: 28px; bottom: 30%; transform: rotate(9deg); }
    .trail-3 { width: 130px; height: 6px; left: 90px; bottom: 18%; transform: rotate(4deg); }

    .side-ui {
      position: absolute;
      z-index: 7;
      top: 214px;
      bottom: 300px;
      width: 22px;
      display: grid;
      grid-template-rows: repeat(16, 1fr);
      gap: 11px;
      pointer-events: none;
    }

    .side-ui.left {
      left: 36px;
    }

    .side-ui.right {
      right: 36px;
    }

    .side-ui span {
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 12px rgba(119,217,255,0.10);
    }

    .side-ui span:nth-child(3n) {
      background: rgba(53,241,255,0.48);
      box-shadow: 0 0 14px rgba(53,241,255,0.34);
    }

    .side-ui span:nth-child(4n) {
      background: rgba(255,124,200,0.44);
      box-shadow: 0 0 14px rgba(255,124,200,0.28);
    }

    .side-text {
      position: absolute;
      z-index: 8;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.46);
      writing-mode: vertical-rl;
      text-transform: uppercase;
      pointer-events: none;
    }

    .side-text.left {
      left: 18px;
      top: 430px;
    }

    .side-text.right {
      right: 18px;
      bottom: 430px;
      transform: rotate(180deg);
    }

    .bottom-panel {
      position: absolute;
      left: 52px;
      right: 52px;
      bottom: 54px;
      height: 200px;
      z-index: 8;
      border-radius: 34px;
      border: 2px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      box-shadow:
        0 20px 42px rgba(0,0,0,0.24),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
    }

    .timeline {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 26px;
      height: 24px;
      z-index: 9;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .timeline span {
      position: relative;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
    }

    .timeline span::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 70%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      box-shadow: 0 0 16px rgba(53,241,255,0.38);
    }

    .timeline span:nth-child(2)::before {
      width: 52%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
    }

    .timeline span:nth-child(3)::before {
      width: 38%;
      background: linear-gradient(90deg, var(--purple), var(--mint));
    }

    .ph-caption {
      position: absolute;
      left: 78px;
      right: 78px;
      bottom: 148px;
      z-index: 10;
      min-height: 48px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.26);
      background: rgba(8,9,19,0.42);
      box-shadow:
        0 12px 24px rgba(0,0,0,0.18),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.05;
      color: var(--white);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 12px rgba(119,217,255,0.24);
    }

    .ph-date {
      position: absolute;
      left: 82px;
      bottom: 104px;
      z-index: 10;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .ph-brand {
      position: absolute;
      right: 82px;
      bottom: 96px;
      z-index: 10;
      padding: 9px 13px;
      border-radius: 999px;
      border: 2px solid rgba(119,217,255,0.34);
      background: rgba(119,217,255,0.12);
      box-shadow: 0 0 16px rgba(53,241,255,0.12);
      font-family: "Space Mono", monospace;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--cyan);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .waveform {
      position: absolute;
      left: 82px;
      right: 82px;
      bottom: 64px;
      z-index: 9;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      pointer-events: none;
    }

    .waveform span {
      width: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.42);
      box-shadow: 0 0 10px rgba(53,241,255,0.18);
    }

    .waveform span:nth-child(1) { height: 8px; }
    .waveform span:nth-child(2) { height: 16px; background: var(--cyan); }
    .waveform span:nth-child(3) { height: 11px; }
    .waveform span:nth-child(4) { height: 20px; background: var(--pink); }
    .waveform span:nth-child(5) { height: 14px; }
    .waveform span:nth-child(6) { height: 18px; background: var(--purple); }
    .waveform span:nth-child(7) { height: 9px; }
    .waveform span:nth-child(8) { height: 15px; background: var(--mint); }
    .waveform span:nth-child(9) { height: 11px; }
    .waveform span:nth-child(10) { height: 19px; background: var(--cyan); }
    .waveform span:nth-child(11) { height: 8px; }
    .waveform span:nth-child(12) { height: 13px; }

    .floating-label {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      padding: 9px 14px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.24);
      background: rgba(8,9,19,0.46);
      box-shadow: 0 12px 24px rgba(0,0,0,0.18);
      backdrop-filter: blur(10px);
      font-family: "Fredoka", "Nunito", sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
    }

    .fl-1 {
      left: 34px;
      top: 320px;
      transform: rotate(-9deg);
      color: var(--pink);
    }

    .fl-2 {
      right: 32px;
      top: 804px;
      transform: rotate(8deg);
      color: var(--cyan);
    }

    .fl-3 {
      left: 44px;
      bottom: 362px;
      transform: rotate(6deg);
      color: var(--mint);
    }

    .ph-sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    @media print {
      body {
        padding: 0;
        background: transparent;
      }

      .ph-canvas {
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div class="ph-canvas template-live-frame-cinemagraph" role="img" aria-label="Polara Live Frame Cinemagraph photobooth strip">
    <div class="outer-frame"></div>

    <header class="top-bar">
      <div class="live-badge">
        <span class="live-dot"></span>
        Live
      </div>

      <div class="title-wrap">
        <h1 class="template-title">Live <span>Frame</span></h1>
        <p class="template-subtitle">cinemagraph strip concept</p>
      </div>

      <div class="timer">00:03</div>
    </header>

    <div class="side-ui left">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="side-ui right">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="side-text left">motion memory strip</div>
    <div class="side-text right">polara live visual mode</div>

    <section class="strip-stack">
      <article class="live-frame">
        <div class="frame-label">Frame 01</div>
        <div class="motion-tag"><span></span><span></span><span></span> motion</div>
        <div class="trail trail-1"></div>
        <div class="trail trail-2"></div>
        <div class="ph-slot" data-slot="1" data-label="FOTO 1"></div>
      </article>

      <article class="live-frame">
        <div class="frame-label">Frame 02</div>
        <div class="motion-tag"><span></span><span></span><span></span> loop</div>
        <div class="trail trail-1"></div>
        <div class="trail trail-3"></div>
        <div class="ph-slot" data-slot="2" data-label="FOTO 2"></div>
      </article>

      <article class="live-frame">
        <div class="frame-label">Frame 03</div>
        <div class="motion-tag"><span></span><span></span><span></span> replay</div>
        <div class="trail trail-2"></div>
        <div class="trail trail-3"></div>
        <div class="ph-slot" data-slot="3" data-label="FOTO 3"></div>
      </article>
    </section>

    <div class="floating-label fl-1">blink!</div>
    <div class="floating-label fl-2">loop</div>
    <div class="floating-label fl-3">replay</div>

    <footer class="bottom-panel">
      <div class="timeline">
        <span></span><span></span><span></span>
      </div>

      <div class="ph-caption">Nama · Live Memory Strip</div>
      <div class="ph-date">02 Jul 2026 · 3 frame capture</div>
      <div class="ph-brand">made with Polara</div>

      <div class="waveform" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
