<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>Polara Template — Trading Card ID Single</title>

  <!--
    Template: Trading Card / ID Card Single
    Type: CSS-heavy collectible card / campus ID photobooth template
    Fonts: Barlow Condensed, Space Mono, Inter
    Canvas: 1080 × 1350 px
    Slots: 1 photo slot
    Output target: PNG export from Polara compositor

    Recommended file location:
    C:\HenryDev\1HenryDev\polara\src\modules\templates\trading-card-id.single.html

    Asset requirement:
    - No required PNG assets.
    - Card border, stats, serial number, holographic shine, and badges are CSS-based.
    - Designed for campus events, community activations, B2B, and identity-style photo results.

    Optional:
    - You can later replace the CSS badge with a Polara logo/mascot asset.
    - Current .ph-brand uses CSS text.

    Template contract:
    - .ph-canvas
    - .ph-slot[data-slot="1"]
    - .ph-caption
    - .ph-date
    - .ph-brand
    - .ph-sticker-layer

    No JavaScript. No framework.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #10131f;
      --card: #f8f3e7;
      --card-2: #fffaf0;
      --ink: #1d2030;
      --muted: #6d6671;
      --line: rgba(29, 32, 48, 0.22);

      --pink: #ff67b3;
      --cyan: #56d8ff;
      --blue: #315bff;
      --violet: #8e67ff;
      --yellow: #ffd84d;
      --green: #6df0b7;
      --red: #ff5a64;
      --white: #ffffff;

      --shadow: rgba(10, 11, 20, 0.32);
      --gold: #d9a943;
      --gold-dark: #9c6f22;
      --silver: #d9e2ec;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #dfe5f2;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .ph-canvas {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      isolation: isolate;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 103, 179, 0.34) 0 12%, transparent 30%),
        radial-gradient(circle at 84% 18%, rgba(86, 216, 255, 0.30) 0 12%, transparent 30%),
        radial-gradient(circle at 20% 86%, rgba(255, 216, 77, 0.28) 0 11%, transparent 28%),
        radial-gradient(circle at 82% 84%, rgba(142, 103, 255, 0.32) 0 14%, transparent 30%),
        linear-gradient(145deg, #111421 0%, #171b2c 52%, #10131f 100%);
      box-shadow: 0 34px 100px rgba(10, 11, 20, 0.36);
    }

    .ph-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.32;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.22) 0 1px, transparent 1.6px);
      background-size: 36px 36px;
      background-position: 10px 12px;
      mix-blend-mode: screen;
    }

    .ph-canvas::after {
      content: "";
      position: absolute;
      inset: -20%;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(
          120deg,
          transparent 0 20%,
          rgba(255,255,255,0.10) 38%,
          rgba(86,216,255,0.09) 50%,
          rgba(255,103,179,0.08) 62%,
          transparent 80% 100%
        );
      transform: rotate(6deg);
      opacity: 0.6;
      mix-blend-mode: screen;
    }

    .card-shell {
      position: absolute;
      left: 90px;
      top: 76px;
      width: 900px;
      height: 1198px;
      z-index: 3;
      border-radius: 48px;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.18)),
        linear-gradient(145deg, var(--gold) 0%, #f7d978 16%, #d6a13d 34%, #f8ebaa 52%, #a97525 72%, #f4d071 100%);
      box-shadow:
        0 36px 88px rgba(10, 11, 20, 0.48),
        inset 0 0 0 2px rgba(255,255,255,0.4);
    }

    .card-shell::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 36px;
      border: 4px solid rgba(29, 32, 48, 0.35);
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.34),
        inset 0 0 50px rgba(255,255,255,0.22);
      pointer-events: none;
      z-index: 1;
    }

    .card-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 24% 14%, rgba(255,103,179,0.22), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(86,216,255,0.22), transparent 28%),
        linear-gradient(180deg, var(--card-2) 0%, var(--card) 52%, #efe4cf 100%);
      border: 3px solid rgba(29, 32, 48, 0.28);
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.44),
        inset 0 0 80px rgba(217,169,67,0.16);
    }

    .card-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(29,32,48,0.07) 0 1.5px, transparent 2px);
      background-size: 28px 28px;
      background-position: 6px 8px;
      opacity: 0.3;
    }

    .top-band {
      position: absolute;
      left: 26px;
      right: 26px;
      top: 24px;
      height: 116px;
      z-index: 5;
      display: grid;
      grid-template-columns: 140px 1fr 140px;
      gap: 16px;
      align-items: center;
    }

    .rating-badge {
      height: 94px;
      border-radius: 20px;
      border: 4px solid var(--ink);
      background:
        linear-gradient(135deg, var(--yellow), #fff2a0);
      display: grid;
      place-items: center;
      box-shadow: 6px 6px 0 rgba(29,32,48,0.14);
      transform: rotate(-2deg);
    }

    .rating-badge strong {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 58px;
      line-height: 0.8;
      font-weight: 900;
      color: var(--ink);
    }

    .rating-badge span {
      display: block;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      font-weight: 700;
      text-align: center;
      color: rgba(29,32,48,0.74);
      text-transform: uppercase;
    }

    .card-title {
      min-height: 98px;
      border-top: 5px solid var(--ink);
      border-bottom: 5px solid var(--ink);
      display: grid;
      place-items: center;
      text-align: center;
      background:
        linear-gradient(90deg, rgba(255,103,179,0.16), rgba(86,216,255,0.18), rgba(255,216,77,0.18));
    }

    .card-title h1 {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 64px;
      line-height: 0.82;
      letter-spacing: -0.02em;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--ink);
    }

    .card-title p {
      margin: 8px 0 0;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      line-height: 1;
      letter-spacing: 0.14em;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    .series-badge {
      height: 94px;
      border-radius: 20px;
      border: 4px solid var(--ink);
      background:
        linear-gradient(135deg, var(--cyan), var(--violet));
      display: grid;
      place-items: center;
      box-shadow: 6px 6px 0 rgba(29,32,48,0.14);
      transform: rotate(2deg);
      color: var(--white);
      text-align: center;
      text-transform: uppercase;
    }

    .series-badge strong {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 34px;
      line-height: 0.86;
      font-weight: 900;
    }

    .series-badge span {
      display: block;
      margin-top: 4px;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .photo-panel {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 164px;
      height: 720px;
      z-index: 4;
      padding: 16px;
      border: 5px solid var(--ink);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.68), rgba(255,255,255,0.16)),
        linear-gradient(135deg, var(--pink), var(--cyan), var(--yellow));
      box-shadow:
        12px 12px 0 rgba(29,32,48,0.16),
        inset 0 0 0 4px rgba(255,255,255,0.28);
    }

    .ph-slot {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 20px;
      border: 4px solid rgba(29,32,48,0.56);
      background:
        radial-gradient(circle at 18% 16%, rgba(255,103,179,0.34), transparent 34%),
        radial-gradient(circle at 84% 82%, rgba(86,216,255,0.28), transparent 34%),
        linear-gradient(135deg, #f8f3e7, #eaf2ff);
      display: grid;
      place-items: center;
    }

    .ph-slot::before {
      content: "FOTO 1";
      position: absolute;
      z-index: 1;
      padding: 16px 28px;
      border: 4px solid rgba(29,32,48,0.22);
      border-radius: 16px;
      background: rgba(255,255,255,0.66);
      color: rgba(29,32,48,0.48);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .ph-slot img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.03) saturate(1.06);
    }

    .ph-slot::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0 32%, rgba(255,255,255,0.18) 42%, transparent 54%),
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.20), transparent 24%);
      mix-blend-mode: screen;
    }

    .position-badge {
      position: absolute;
      left: 38px;
      top: 644px;
      z-index: 8;
      width: 154px;
      height: 154px;
      border-radius: 50%;
      border: 6px solid var(--ink);
      background:
        linear-gradient(135deg, var(--pink), var(--red));
      color: var(--white);
      display: grid;
      place-items: center;
      text-align: center;
      box-shadow: 8px 8px 0 rgba(29,32,48,0.16);
      transform: rotate(-8deg);
    }

    .position-badge strong {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 46px;
      line-height: 0.82;
      font-weight: 900;
      text-transform: uppercase;
    }

    .position-badge span {
      display: block;
      margin-top: 5px;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .serial {
      position: absolute;
      right: 54px;
      top: 904px;
      z-index: 6;
      padding: 9px 14px;
      border: 3px solid var(--ink);
      border-radius: 14px;
      background: rgba(255,255,255,0.56);
      font-family: "Space Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--ink);
      transform: rotate(2deg);
    }

    .ph-caption {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 900px;
      z-index: 5;
      min-height: 72px;
      padding: 8px 216px 8px 18px;
      border-top: 5px solid var(--ink);
      border-bottom: 5px solid var(--ink);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 58px;
      line-height: 0.9;
      letter-spacing: -0.02em;
      font-weight: 900;
      color: var(--ink);
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats-grid {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 994px;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat {
      min-height: 96px;
      padding: 10px 8px;
      border: 4px solid var(--ink);
      border-radius: 18px;
      background: rgba(255,255,255,0.52);
      box-shadow: 6px 6px 0 rgba(29,32,48,0.12);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 46px;
      line-height: 0.86;
      font-weight: 900;
      color: var(--ink);
    }

    .stat span {
      display: block;
      margin-top: 8px;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    .bio-line {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 1114px;
      z-index: 5;
      min-height: 52px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      font-family: "Space Mono", monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .bio-line div {
      border-top: 3px solid var(--ink);
      border-bottom: 3px solid var(--ink);
      padding: 12px 0;
    }

    .footer-row {
      position: absolute;
      left: 54px;
      right: 54px;
      bottom: 30px;
      z-index: 5;
      height: 68px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
    }

    .ph-date {
      padding: 12px 0;
      border-top: 3px solid var(--ink);
      font-family: "Space Mono", monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.09em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .ph-brand {
      width: max-content;
      padding: 12px 15px;
      border: 3px solid var(--ink);
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(255,103,179,0.18), rgba(86,216,255,0.18)),
        rgba(255,255,255,0.5);
      box-shadow: 5px 5px 0 rgba(29,32,48,0.12);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-transform: uppercase;
      transform: rotate(-1deg);
      white-space: nowrap;
    }

    .holo-shape {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      border-radius: 999px;
      opacity: 0.72;
      mix-blend-mode: multiply;
      filter: blur(0.3px);
    }

    .shape-1 {
      width: 160px;
      height: 160px;
      left: -44px;
      top: 220px;
      background: radial-gradient(circle, rgba(255,103,179,0.42), transparent 68%);
    }

    .shape-2 {
      width: 180px;
      height: 180px;
      right: -44px;
      top: 506px;
      background: radial-gradient(circle, rgba(86,216,255,0.42), transparent 68%);
    }

    .shape-3 {
      width: 220px;
      height: 220px;
      left: 260px;
      bottom: -80px;
      background: radial-gradient(circle, rgba(255,216,77,0.35), transparent 68%);
    }

    .side-label {
      position: absolute;
      z-index: 6;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.62);
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }

    .side-left {
      left: 34px;
      top: 260px;
    }

    .side-right {
      right: 34px;
      bottom: 260px;
      transform: rotate(180deg);
    }

    .ph-sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    @media print {
      body {
        padding: 0;
        background: transparent;
      }

      .ph-canvas {
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <div class="ph-canvas template-trading-card-id" role="img" aria-label="Polara Trading Card ID photobooth frame">
    <div class="side-label side-left">collectible identity frame</div>
    <div class="side-label side-right">polara instant card edition</div>

    <section class="card-shell">
      <div class="card-inner">
        <div class="holo-shape shape-1"></div>
        <div class="holo-shape shape-2"></div>
        <div class="holo-shape shape-3"></div>

        <header class="top-band">
          <div class="rating-badge">
            <div>
              <strong>99</strong>
              <span>vibe rate</span>
            </div>
          </div>

          <div class="card-title">
            <div>
              <h1>Polara Card</h1>
              <p>campus / event / community edition</p>
            </div>
          </div>

          <div class="series-badge">
            <div>
              <strong>2026</strong>
              <span>series</span>
            </div>
          </div>
        </header>

        <div class="photo-panel">
          <div class="ph-slot" data-slot="1"></div>
        </div>

        <div class="position-badge">
          <div>
            <strong>ID</strong>
            <span>photo card</span>
          </div>
        </div>

        <div class="serial">NO. PLR-001</div>

        <div class="ph-caption">Nama User</div>

        <section class="stats-grid" aria-hidden="true">
          <div class="stat">
            <strong>98</strong>
            <span>pose</span>
          </div>
          <div class="stat">
            <strong>95</strong>
            <span>style</span>
          </div>
          <div class="stat">
            <strong>99</strong>
            <span>mood</span>
          </div>
          <div class="stat">
            <strong>97</strong>
            <span>share</span>
          </div>
        </section>

        <section class="bio-line" aria-hidden="true">
          <div>Team: Polara Purr</div>
          <div>Role: Main Character</div>
        </section>

        <footer class="footer-row">
          <div class="ph-date">02 Jul 2026</div>
          <div class="ph-brand">made with Polara</div>
        </footer>
      </div>
    </section>

    <div class="ph-sticker-layer"></div>
  </div>
</body>
</html>
